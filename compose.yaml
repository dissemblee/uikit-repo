

services:
  app:
    image: node:20
    ports:
      - "8082:3000"
    command: >
      sh -c "npm install && npm run start:dev"
    environment:
      NODE_ENV: development
      MINIO_HOST: minio
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    working_dir: /app
    depends_on:
      minio:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /tmp:/tmp
    networks:
      base:
        
  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "0000:9000"
      - "0000:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    networks:
      base:
    restart: unless-stopped
    
  build:
    image: ghcr.io/48-iq/uikit-build:v0.0.7
    depends_on:
      postgres: 
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - 8080:3000
    environment:
      - MINIO_HOST=minio
      - MINIO_PORT=9000
      - MINIO_USER=minio
      - CORS_ORIGIN=http://localhost:3000
      - MINIO_PASSWORD=password

      - JWT_ISSUER=uikit.space-auth-service
      - JWT_AUDIENCE=uikit.space
      - JWT_ALGORITHM=HS256
      - JWT_EXP_TIME=300s
      - JWT_SECRET=secret

      - POSTGRES_DB=uikit-build-db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432

    networks:
      base:

      
  postgres:
    image: postgres:18
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    ports:
      - 0000:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      base:
    restart: unless-stopped
    
volumes:
  minio-data:
  postgres-data:


networks:
  base: